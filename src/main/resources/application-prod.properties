server.servlet.context-path=/api
spring.application.name=hotelbooking
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
jwt.secret-key = ${JWT_SECRET_KEY}
jwt.expiration-ms = ${JWT_EXPIRATION_MS}
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.repositories.enabled=false
spring.mail.host =smtp.gmail.com
spring.mail.port =587
spring.mail.username = ${MAIL_USERNAME}
spring.mail.password = ${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth = true
spring.mail.properties.mail.smtp.starttls.enable = true
image-upload-path = src/main/resources/static/images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
account.admin.username = ${ACCOUNT_ADMIN_USERNAME}
account.admin.password = ${ACCOUNT_ADMIN_PASSWORD}
account.default.password = ${ACCOUNT_DEFAULT_PASSWORD}
firebase.service-account-key-path = ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH}
logging.file.name=logs/hotel-booking.log
cdn.cloud-name=${CDN_CLOUD_NAME}
cdn.api-key=${CDN_API_KEY}
cdn.api-secret=${CDN_API_SECRET}
spring.output.ansi.enabled=ALWAYS
