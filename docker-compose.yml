services:
  mysql:
    image: mysql:latest
    container_name: hotelbooking-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hotelbooking
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
  redis:
    image: redis:latest
    container_name: hotelbooking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotelbooking-app
    ports:
      - "8080:8080"
    environment:
      # DATABASE_URL: ${DATABASE_URL:-jdbc:mysql://mysql:3306/hotelbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      # DATABASE_USERNAME: ${DATABASE_USERNAME:-root}
      # DATABASE_PASSWORD: ${DATABASE_PASSWORD:-root123}
      # SPRING_DATASOURCE_URL: ${DATABASE_URL:-jdbc:mysql://mysql:3306/hotelbooking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      # SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME:-root}
      # SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD:-root123}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ACCOUNT_ADMIN_USERNAME: ${ACCOUNT_ADMIN_USERNAME}
      ACCOUNT_ADMIN_PASSWORD: ${ACCOUNT_ADMIN_PASSWORD}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: /run/secrets/firebase-admin.json
    volumes:
      - ./booking-hotel-app-43981-firebase-adminsdk-fbsvc-c91a1a3701.json:/run/secrets/firebase-admin.json:ro

    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  mysql-data:
  redis-data: